spring.application.name=PharmaFlow
server.port=${SERVER_PORT:9090}

# Database configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.show-sql=true
spring.jpa.database=postgresql
spring.jpa.hibernate.ddl-auto=update

api.version=${API_VERSION:v1}
server.servlet.context-path=/api/${api.version}

# JWT configuration
security.jwt.secret-key=${JWT_SECRET:PfBlyd9pmSSuDPHfLO275n7IM6nivL8Vors276QlvtD}
security.jwt.expiration-time=${JWT_EXPIRATION:86400000}

# File configuration
file.upload-dir=./uploads/products
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Mail configuration
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USER}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Docs configuration
springdoc.swagger-ui.path=/swagger-ui.html

# Redis configuration
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.cache.type=redis

spring.security.oauth2.client.registration.google.scope=profile,email
